hugoblox:
  schema: "2.0"
  head_custom_includes:
    - "<link href=\"/css/luxury.css\" rel=\"stylesheet\">"
  identity:
    name: Eli Diaz - The Meridian Sherpa
    type: person
    tagline: Strategic advisory for those who build legacies beyond borders.
    description: Guiding exceptional families through the complexity of global wealth. No products sold. No commissions taken. Clarity as the only currency.
  theme:
    mode: dark
    pack: matcha
    colors:
      primary: "#c9a962"
      secondary: "#1a1a1a"
      neutral: "#0a0a0a"
  typography:
    font: serif
    size: xl
  layout:
    radius: none
    spacing: spacious
    avatar_shape: rounded
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: false
    theme_toggle: false
  footer:
    style: minimal
    language_switcher: false
  copyright:
    notice: © {year} {name}
  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
  search:
    enable: true
  comments:
    disqus:
      shortname: elidiazgt
    enable: true
  debug:
    enable: true
